# Render Blueprint — free tier: backend on Render + Postgres on Neon (free)
#
# BEFORE deploy:
#   1. Create free DB at https://neon.tech → copy connection string
#   2. In Render dashboard, set DATABASE_URL to that connection string
#   3. Set ALLOWED_HOSTS to your Render URL (e.g. kapita-api.onrender.com)
#   4. After first deploy, Shell: python manage.py create_admin
#   5. Deploy frontend on Vercel with VITE_API_URL=https://<your-app>.onrender.com/api

services:
  - type: web
    name: kapita-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn kapita.wsgi:application --bind 0.0.0.0:$PORT --log-file -
    releaseCommand: python manage.py migrate --noinput && python manage.py collectstatic --noinput
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: RENDER
        value: "true"
      - key: DATABASE_URL
        sync: false
      - key: JWT_ACCESS_TOKEN_LIFETIME
        value: "60"
      - key: JWT_REFRESH_TOKEN_LIFETIME
        value: "1440"
      - key: ALLOWED_HOSTS
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: CSRF_TRUSTED_ORIGINS
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_AUTHORIZED_PARTIES
        sync: false
